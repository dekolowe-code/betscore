kind = "web"
previewPath = "/"
title = "BettingAI — Assistant Paris Sportifs"
version = "1.0.0"
id = "artifacts/betting-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21527

[services.development]
run = "pnpm --filter @workspace/betting-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/betting-ai", "run", "build" ]
publicDir = "artifacts/betting-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21527"
BASE_PATH = "/"
